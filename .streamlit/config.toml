[server]
headless = true
# port is intentionally not pinned here so $PORT (Render/Cloud Run/etc.)
# or the --server.port CLI flag can take effect.
enableCORS = false
enableXsrfProtection = false

[theme]
primaryColor = "#FF6B35"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[browser]
gatherUsageStats = false
