# dbt_logistics/profiles.yml

logistics:
  target: dev
  outputs:
    dev:
      type: duckdb
      path: "{{ env_var('LOGISTICS_DUCKDB_PATH', '../data/warehouse/logistics.duckdb') }}"
      threads: 4
      
    prod:
      type: duckdb
      path: "{{ env_var('LOGISTICS_DUCKDB_PROD_PATH', '../data/warehouse/logistics_prod.duckdb') }}"
      threads: 8
